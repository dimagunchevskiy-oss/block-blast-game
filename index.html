<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>БЛОК БЛАСТ</title>
<meta name="theme-color" content="#1565c0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;background:#1a237e;font-family:'Fredoka One',cursive}

.scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;transition:opacity .35s ease,transform .35s ease}
.scr.off{opacity:0;pointer-events:none;transform:scale(.94)}

/* ══ MENU ══ */
#sMenu{
  background:linear-gradient(180deg,#1e88e5 0%,#1565c0 50%,#0d47a1 100%);
}
.menu-logo-wrap{margin-top:max(env(safe-area-inset-top),20px);margin-bottom:10px;text-align:center}
.menu-logo-canvas{display:block;margin:0 auto}
.menu-card-play{
  width:min(88vw,340px);
  background:linear-gradient(160deg,#ffe082 0%,#ffb300 100%);
  border-radius:22px;padding:14px 16px;margin:8px 0;
  display:flex;align-items:center;gap:14px;cursor:pointer;
  box-shadow:0 6px 0 #e65100,0 10px 24px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.4);
  transition:transform .1s,box-shadow .1s;
  border:none;width:min(88vw,340px);
}
.menu-card-play:active{transform:translateY(4px);box-shadow:0 2px 0 #e65100,0 4px 10px rgba(0,0,0,.2)}
.menu-card-preview{width:70px;height:70px;border-radius:12px;background:#0d47a1;flex-shrink:0;overflow:hidden}
.menu-card-info{flex:1;text-align:left}
.menu-card-mode{font-size:18px;color:#4a148c;letter-spacing:1px}
.menu-card-score-row{display:flex;align-items:center;gap:6px;margin-top:4px}
.menu-card-score{font-size:26px;color:#fff}

.menu-daily-btn{
  width:min(88vw,340px);
  background:linear-gradient(160deg,rgba(255,255,255,.18),rgba(255,255,255,.08));
  border:1.5px solid rgba(255,255,255,.25);border-radius:18px;padding:14px 20px;
  margin:6px 0;cursor:pointer;display:flex;align-items:center;gap:12px;
  box-shadow:0 4px 14px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.2);
  transition:transform .1s;
}
.menu-daily-btn:active{transform:scale(.97)}
.menu-daily-lbl{font-size:18px;color:#fff}
.menu-daily-sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}
.menu-stat-row{display:flex;align-items:center;gap:8px;margin-top:4px}
.menu-streak-badge{display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.12);border-radius:14px;padding:6px 12px;margin:4px 0}
.menu-streak-val{font-size:22px;color:#fbbf24}

.dev-lbl{font-size:11px;color:rgba(255,255,255,.25);letter-spacing:1px;margin-top:10px;text-align:center}
.dev-name{
  background:linear-gradient(90deg,#80d8ff,#ea80fc,#ff8a80,#ffd740,#80d8ff);
  background-size:250% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:devsh 4s linear infinite;font-size:14px;letter-spacing:2px
}
@keyframes devsh{0%{background-position:0%}100%{background-position:250%}}

/* ══ RECORDS ══ */
#sRec{background:linear-gradient(180deg,#1e88e5,#0d47a1)}
.rtitle{font-size:30px;color:#fff;margin-bottom:16px;text-align:center}
.rlist{width:min(90vw,360px);background:rgba(0,0,50,.25);border:1px solid rgba(255,255,255,.15);
  border-radius:22px;padding:14px 16px;max-height:56vh;overflow-y:auto;margin-bottom:16px}
.ri{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08);animation:slin .3s ease both}
.ri:last-child{border-bottom:none}
@keyframes slin{from{opacity:0;transform:translateX(-14px)}to{opacity:1}}
.ri-rk{font-size:18px;width:28px;text-align:center;color:#fbbf24}
.rk2{color:#c0c8d8}.rk3{color:#cd8a4f}.rko{color:rgba(255,255,255,.3);font-size:14px}
.ri-sc{flex:1;font-size:22px;color:#fff}
.ri-dt{font-size:11px;color:rgba(255,255,255,.3)}
.no-rec{text-align:center;color:rgba(255,255,255,.3);padding:24px;font-size:14px}

/* ══ DAILY ══ */
#sDaily{background:linear-gradient(180deg,#1e88e5,#0d47a1)}
.screen-title{font-size:28px;color:#fff;text-align:center;margin-bottom:6px}
.coins-bar{display:flex;align-items:center;gap:8px;
  background:rgba(255,200,0,.15);border:1px solid rgba(255,200,0,.3);
  border-radius:20px;padding:6px 14px;margin-bottom:12px}
.coins-amt{font-size:20px;color:#ffd740}
.coins-lbl{font-size:10px;color:rgba(255,200,0,.5);letter-spacing:2px;text-transform:uppercase;margin-left:2px}
.daily-scroll{width:100%;overflow-y:auto;max-height:60vh;padding:0 2px}
.daily-reset{font-size:11px;color:rgba(255,255,255,.3);text-align:center;margin-bottom:10px}
.task-card{width:min(92vw,360px);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  border-radius:18px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;animation:slin .3s ease both}
.task-card.done{background:rgba(76,175,80,.15);border-color:rgba(76,175,80,.3)}
.task-ico-wrap{width:36px;height:36px;flex-shrink:0}
.task-info{flex:1;min-width:0}
.task-name{font-size:15px;color:#fff;margin-bottom:3px}
.task-prog-wrap{height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.task-prog{height:100%;border-radius:3px;background:linear-gradient(90deg,#7c4dff,#40c4ff);transition:width .4s}
.task-card.done .task-prog{background:linear-gradient(90deg,#4caf50,#40c4ff)}
.task-reward{flex-shrink:0;text-align:center;font-size:13px;color:#ffd740}
.task-reward-ico{font-size:18px;display:block}
.task-claim{flex-shrink:0;background:linear-gradient(145deg,#4caf50,#2e7d32);border:none;
  border-radius:11px;padding:8px 12px;font-family:'Fredoka One',cursive;font-size:14px;
  color:#fff;cursor:pointer;box-shadow:0 3px 0 #1b5e20;transition:transform .1s}
.task-claim:active{transform:translateY(2px);box-shadow:none}
.task-claimed{flex-shrink:0;font-size:22px}

/* ══ STATS ══ */
#sStat{background:linear-gradient(180deg,#1e88e5,#0d47a1)}
.stat-title{font-size:28px;color:#fff;text-align:center;margin-bottom:16px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:min(90vw,340px);margin-bottom:16px}
.stat-card{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  border-radius:18px;padding:14px 12px;text-align:center;animation:slin .3s ease both}
.stat-card-ico{width:28px;height:28px;margin:0 auto 4px}
.stat-card-lbl{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.stat-card-val{font-size:24px;color:#fff}
.stat-card-val.gold{color:#ffd740}
.stat-card-val.blue{color:#40c4ff}
.stat-card-val.purple{color:#ea80fc}
.stat-card-val.red{color:#ff5252}

/* Buttons — shared */
.bb-btn{border:none;border-radius:18px;font-family:'Fredoka One',cursive;
  font-size:19px;color:#fff;cursor:pointer;padding:14px 24px;
  transition:transform .1s,box-shadow .1s;display:flex;align-items:center;justify-content:center;gap:8px}
.bb-btn:active{transform:translateY(3px)}
.bb-btn-blue{background:linear-gradient(160deg,#42a5f5,#1565c0);box-shadow:0 5px 0 #0d47a1,0 8px 20px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.25)}
.bb-btn-blue:active{box-shadow:0 2px 0 #0d47a1}
.bb-btn-green{background:linear-gradient(160deg,#66bb6a,#2e7d32);box-shadow:0 5px 0 #1b5e20,inset 0 1px 0 rgba(255,255,255,.25)}
.bb-btn-green:active{box-shadow:0 2px 0 #1b5e20}
.bb-btn-gray{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2)}

/* ══ GAME ══ */
#sGame{
  background:linear-gradient(180deg,#1e88e5 0%,#1565c0 40%,#0d47a1 100%);
  justify-content:flex-start;
}

.ghdr{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:max(env(safe-area-inset-top),10px) 16px 6px;
  flex-shrink:0;position:relative;z-index:10;
}
.best-left{display:flex;align-items:center;gap:6px}
.best-val{font-size:22px;color:#fff;filter:drop-shadow(0 2px 6px rgba(0,0,0,.3))}
.score-center{position:absolute;left:50%;transform:translateX(-50%);text-align:center}
.score-main{font-size:44px;color:#fff;filter:drop-shadow(0 3px 10px rgba(0,0,0,.4));line-height:1;transition:none}
.score-main.pop{animation:spop .25s cubic-bezier(.175,.885,.32,1.275)}
@keyframes spop{0%,100%{transform:scale(1)}50%{transform:scale(1.16)}}

/* Combo row */
.crow{width:100%;min-height:26px;display:flex;align-items:center;justify-content:center;
  padding:2px 16px;flex-shrink:0;gap:10px;position:relative}
.combo-label{font-size:16px;color:#80d8ff;opacity:0;transition:opacity .2s}
.combo-label.on{opacity:1}
.combo-num{font-size:28px;color:#ffd740;opacity:0;
  text-shadow:0 0 12px rgba(255,215,64,.6);transition:opacity .2s}
.combo-num.on{opacity:1;animation:combon .4s cubic-bezier(.175,.885,.32,1.275)}
@keyframes combon{0%{transform:scale(.3)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.praise-pop{position:fixed;left:50%;top:28%;transform:translateX(-50%);
  white-space:nowrap;font-size:28px;color:#fff;
  text-shadow:0 3px 16px rgba(0,0,0,.5);pointer-events:none;z-index:300;
  animation:praisepop .9s ease forwards}
@keyframes praisepop{
  0%{opacity:0;transform:translateX(-50%) scale(.3) translateY(10px)}
  20%{opacity:1;transform:translateX(-50%) scale(1.1) translateY(0)}
  70%{opacity:1;transform:translateX(-50%) scale(1) translateY(-10px)}
  100%{opacity:0;transform:translateX(-50%) scale(.9) translateY(-30px)}
}

/* fill bar */
.fill-meter{width:100%;height:4px;background:rgba(0,0,0,.2);flex-shrink:0}
.fill-meter-bar{height:100%;background:linear-gradient(90deg,#69f0ae,#40c4ff);transition:width .4s}

/* Grid */
.gwrap{flex:1;display:flex;align-items:center;justify-content:center;
  width:100%;position:relative;min-height:0;padding:4px 8px}
#gc{display:block;border-radius:16px;
  box-shadow:0 8px 30px rgba(0,0,0,.5),0 0 0 2px rgba(255,255,255,.1)}

/* Tray */
.tray{width:100%;display:flex;justify-content:space-around;align-items:center;
  padding:6px 8px max(env(safe-area-inset-bottom),14px);
  flex-shrink:0;gap:4px;min-height:110px}
.pslot{flex:1;display:flex;align-items:center;justify-content:center;
  min-height:94px;border-radius:16px;
  background:rgba(255,255,255,.07);
  border:1.5px solid rgba(255,255,255,.12);
  transition:opacity .2s,transform .2s,border-color .2s;overflow:visible}
.pslot.used{opacity:.12;filter:grayscale(.8)}
.pslot.dragging{opacity:.08;transform:scale(.88)}
.pslot.canfit{border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.13)}
.pslot.cantfit{opacity:.28;filter:grayscale(.9)}

/* Drag ghost */
#dg{position:fixed;pointer-events:none;z-index:999;display:none;
  filter:drop-shadow(0 6px 20px rgba(0,0,0,.5))}

/* ══ OVERLAYS ══ */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;z-index:500;
  opacity:0;pointer-events:none;transition:opacity .3s}
.ov.on{opacity:1;pointer-events:all}
.ovc{background:linear-gradient(145deg,#1565c0,#0d47a1);
  border:1.5px solid rgba(255,255,255,.2);border-radius:28px;padding:28px 22px;
  text-align:center;width:min(88vw,320px);
  box-shadow:0 28px 70px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.15);
  transform:scale(.88) translateY(14px);transition:transform .4s cubic-bezier(.175,.885,.32,1.275)}
.ov.on .ovc{transform:scale(1) translateY(0)}
.ovt{font-size:30px;color:#fff;margin-bottom:4px}
.ovl{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:4px;text-transform:uppercase;margin-bottom:4px}
.ovs{font-size:54px;color:#fff;line-height:1;margin:6px 0;
  filter:drop-shadow(0 4px 16px rgba(255,255,255,.25))}
.nrb{background:linear-gradient(135deg,#ffd740,#ff4081);border-radius:20px;
  padding:5px 18px;font-size:14px;color:#fff;margin-bottom:14px;display:none;
  animation:bpop .5s cubic-bezier(.175,.885,.32,1.275);box-shadow:0 4px 16px rgba(255,64,129,.4)}
@keyframes bpop{from{transform:scale(0) rotate(-12deg)}80%{transform:scale(1.08)}to{transform:scale(1)}}
.ov-stats{display:flex;gap:8px;margin-bottom:14px}
.ov-stat{flex:1;border-radius:14px;padding:10px 6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15)}
.ov-stat-lbl{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:3px;text-transform:uppercase;margin-bottom:2px}
.ov-stat-val{font-size:20px;color:#fff}

/* ══ FX ══ */
#pc{position:fixed;inset:0;pointer-events:none;z-index:200}
.score-fly{position:fixed;pointer-events:none;z-index:260;font-family:'Fredoka One',cursive;
  font-size:22px;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.5)}
.lfl{position:absolute;pointer-events:none;z-index:14;animation:lfa .5s ease forwards}
@keyframes lfa{0%{opacity:.9}100%{opacity:0;transform:scale(1.03)}}
.shard{position:fixed;pointer-events:none;z-index:202;border-radius:3px;animation:shardfly var(--dur) ease-out forwards}
@keyframes shardfly{0%{opacity:1;transform:translate(0,0) rotate(0deg) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) rotate(var(--rot)) scale(.1)}}
@keyframes pieceIn{0%{transform:translateY(42px) scale(.6);opacity:0}70%{transform:translateY(-4px) scale(1.06);opacity:1}100%{transform:translateY(0) scale(1);opacity:1}}
.pslot.spawning{animation:pieceIn .38s cubic-bezier(.175,.885,.32,1.275) both}
.score-flash{position:fixed;inset:0;pointer-events:none;z-index:300;
  background:radial-gradient(ellipse at 50% 30%,rgba(255,255,255,.14),transparent 70%);
  opacity:0;animation:sflash .4s ease forwards}
@keyframes sflash{0%{opacity:0}25%{opacity:1}100%{opacity:0}}
.coins-pop{position:fixed;left:50%;pointer-events:none;z-index:900;
  font-family:'Fredoka One',cursive;font-size:24px;color:#ffd740;
  text-shadow:0 2px 10px rgba(255,215,64,.6);animation:coinspop .9s ease forwards}
@keyframes coinspop{0%{opacity:0;transform:translateX(-50%) translateY(0) scale(.6)}
  40%{opacity:1;transform:translateX(-50%) translateY(-28px) scale(1.12)}
  100%{opacity:0;transform:translateX(-50%) translateY(-65px) scale(.9)}}

/* SHARE */
#shareOverlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(16px);
  display:flex;align-items:center;justify-content:center;z-index:800;
  opacity:0;pointer-events:none;transition:opacity .3s}
#shareOverlay.on{opacity:1;pointer-events:all}
.share-wrap{display:flex;flex-direction:column;align-items:center;gap:14px}
#shareCard{border-radius:22px;box-shadow:0 30px 80px rgba(0,0,0,.8)}
.share-actions{display:flex;gap:10px}
.share-btn{padding:12px 22px;border:none;border-radius:14px;font-family:'Fredoka One',cursive;font-size:17px;color:#fff;cursor:pointer;transition:transform .1s}
.share-btn:active{transform:scale(.96)}
.share-btn-dl{background:linear-gradient(145deg,#7c4dff,#512da8);box-shadow:0 4px 0 #311b92}
.share-btn-cl{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2)}

/* ══ SHOP ══ */
#sShop{background:linear-gradient(180deg,#1e88e5,#0d47a1)}
.shop-scroll{width:100%;overflow-y:auto;max-height:62vh;padding:0 2px}
.shop-section-lbl{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:4px;text-transform:uppercase;margin:12px 0 8px 4px}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:min(92vw,380px)}
.shop-item{
  background:linear-gradient(145deg,rgba(255,255,255,.18),rgba(255,255,255,.08));
  border:2px solid rgba(255,255,255,.25);border-radius:20px;padding:14px 10px 12px;
  text-align:center;cursor:pointer;position:relative;overflow:hidden;
  box-shadow:0 6px 20px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.2);
  transition:transform .12s,box-shadow .12s;
}
.shop-item:active{transform:scale(.95)}
.shop-item.owned{background:linear-gradient(145deg,rgba(76,175,80,.25),rgba(76,175,80,.1));border-color:rgba(76,175,80,.5)}
.shop-item.active-theme{background:linear-gradient(145deg,rgba(255,215,64,.25),rgba(255,165,0,.1));border-color:#ffd740;box-shadow:0 0 20px rgba(255,215,64,.3),0 6px 20px rgba(0,0,0,.25)}
.shop-preview{
  height:60px;display:flex;flex-wrap:wrap;gap:3px;align-items:center;justify-content:center;
  margin-bottom:8px;padding:4px;background:rgba(0,0,0,.2);border-radius:12px;
}
.shop-preview-block{border-radius:4px;box-shadow:0 2px 4px rgba(0,0,0,.3)}
.shop-name{font-size:15px;color:#fff;margin-bottom:5px;text-shadow:0 1px 4px rgba(0,0,0,.3)}
.shop-price-row{display:flex;align-items:center;justify-content:center;gap:5px}
.shop-price-val{font-size:14px;color:#ffd740}
.shop-badge{position:absolute;top:6px;right:6px;background:linear-gradient(135deg,#f43f5e,#ffd740);border-radius:8px;padding:2px 6px;font-size:10px;color:#fff;font-family:'Fredoka One',cursive}
.shop-owned-tag{font-size:13px;color:#69f0ae}
.shop-active-tag{font-size:13px;color:#ffd740}
/* Coins bar same as daily */

.rlist::-webkit-scrollbar,.daily-scroll::-webkit-scrollbar{width:3px}
.rlist::-webkit-scrollbar-track,.daily-scroll::-webkit-scrollbar-track{background:transparent}
.rlist::-webkit-scrollbar-thumb,.daily-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}

/* ══ SHOP ══ */
#sShop{background:linear-gradient(180deg,#1e88e5,#0d47a1)}
.shop-coins-bar{display:flex;align-items:center;gap:8px;background:rgba(255,200,0,.15);border:1.5px solid rgba(255,200,0,.35);border-radius:22px;padding:8px 18px;margin-bottom:14px;box-shadow:0 0 20px rgba(255,200,0,.15)}
.shop-coins-amt{font-size:22px;color:#ffd740;filter:drop-shadow(0 0 8px rgba(255,215,64,.5))}
.shop-coins-lbl{font-size:11px;color:rgba(255,200,0,.5);letter-spacing:2px;text-transform:uppercase;margin-left:2px}
.shop-title{font-size:26px;color:#fff;text-align:center;margin-bottom:4px}
.shop-subtitle{font-size:12px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:14px;letter-spacing:1px}
.shop-scroll{width:100%;overflow-y:auto;max-height:60vh;padding:0 4px}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:min(92vw,360px)}
.shop-card{
  border-radius:20px;overflow:hidden;cursor:pointer;
  position:relative;
  box-shadow:0 6px 20px rgba(0,0,0,.35);
  transition:transform .12s,box-shadow .12s;
}
.shop-card:active{transform:scale(.95)}
.shop-card-inner{padding:12px 10px 10px;text-align:center}
.shop-card.owned{box-shadow:0 6px 20px rgba(76,175,80,.4)}
.shop-card.active-theme{box-shadow:0 0 0 3px #ffd740,0 8px 24px rgba(255,215,64,.5)}
.shop-preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;width:48px;height:48px;margin:0 auto 6px;border-radius:8px;overflow:hidden}
.shop-preview-cell{border-radius:2px}
.shop-name{font-size:14px;color:#fff;margin-bottom:5px;font-family:"Fredoka One",cursive}
.shop-badge-owned{position:absolute;top:6px;right:6px;background:linear-gradient(135deg,#4caf50,#2e7d32);border-radius:8px;padding:2px 7px;font-size:10px;font-family:"Fredoka One",cursive;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.shop-badge-active{position:absolute;top:6px;right:6px;background:linear-gradient(135deg,#ffd740,#ff9100);border-radius:8px;padding:2px 7px;font-size:10px;font-family:"Fredoka One",cursive;color:#fff;box-shadow:0 2px 6px rgba(255,145,0,.4)}
.shop-buy-btn{
  width:100%;padding:8px;border:none;border-radius:12px;

}
.shop-buy-btn:active{transform:scale(.95);filter:brightness(.88)}

.shop-buy-btn.buy:active{box-shadow:0 1px 0 #bf360c}

</style>

<script>
'use strict';
// ══════════════════════════════════════════════════════════
// CANVAS ICONS — всё рисуем сами, без эмодзи
// ══════════════════════════════════════════════════════════
function drawCrown(cv, w, h, col) {
  col = col || '#ffd740';
  var ctx = cv.getContext('2d'); ctx.clearRect(0,0,w,h);
  var s = Math.min(w,h)*0.88, ox=(w-s)/2, oy=(h-s)/2+s*0.1;
  // shadow
  ctx.fillStyle='rgba(0,0,0,.3)';
  ctx.beginPath();ctx.ellipse(w/2,oy+s*.92,s*.38,s*.08,0,0,Math.PI*2);ctx.fill();
  // base rect
  var g=ctx.createLinearGradient(ox,oy+s*.45,ox,oy+s);
  g.addColorStop(0,col);g.addColorStop(1,'#e65100');
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.roundRect(ox,oy+s*.45,s,s*.48,s*.08);ctx.fill();
  // crown teeth
  ctx.fillStyle=col;
  var pts=[[ox,oy+s*.45],[ox,oy+s*.05],[ox+s*.22,oy+s*.35],[ox+s*.5,oy],[ox+s*.78,oy+s*.35],[ox+s,oy+s*.05],[ox+s,oy+s*.45]];
  ctx.beginPath();pts.forEach(function(p,i){i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1])});ctx.closePath();
  var g2=ctx.createLinearGradient(ox,oy,ox,oy+s*.45);
  g2.addColorStop(0,'#fff176');g2.addColorStop(1,col);ctx.fillStyle=g2;ctx.fill();
  // shine
  ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.beginPath();ctx.ellipse(ox+s*.5,oy+s*.12,s*.1,s*.07,-.3,0,Math.PI*2);ctx.fill();
  // gems
  [[.25,.62,'#ef5350'],[.5,.62,'#42a5f5'],[.75,.62,'#66bb6a']].forEach(function(g3){
    ctx.fillStyle=g3[2];ctx.beginPath();ctx.arc(ox+s*g3[0],oy+s*g3[1],s*.065,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.beginPath();ctx.arc(ox+s*g3[0]-s*.02,oy+s*g3[1]-s*.02,s*.025,0,Math.PI*2);ctx.fill();
  });
}

function drawPauseIcon(cv, sz, isPaused) {
  var ctx = cv.getContext('2d'); ctx.clearRect(0,0,sz,sz);
  var r=sz/2-1;
  // circle
  var g=ctx.createRadialGradient(sz*.4,sz*.35,1,sz/2,sz/2,r);
  g.addColorStop(0,'rgba(255,255,255,.25)');g.addColorStop(1,'rgba(255,255,255,.1)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(sz/2,sz/2,r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(sz/2,sz/2,r,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#fff';
  if(isPaused){
    // play triangle
    ctx.beginPath();ctx.moveTo(sz*.38,sz*.26);ctx.lineTo(sz*.38,sz*.74);ctx.lineTo(sz*.76,sz*.5);ctx.closePath();ctx.fill();
  } else {
    // two bars
    ctx.fillRect(sz*.3,sz*.27,sz*.13,sz*.46);
    ctx.fillRect(sz*.57,sz*.27,sz*.13,sz*.46);
  }
}

function drawBlastCoin(cv, sz) {
  var ctx=cv.getContext('2d'); ctx.clearRect(0,0,sz,sz);
  var cx=sz/2,cy=sz/2,r=sz*.44;
  var gl=ctx.createRadialGradient(cx,cy,r*.2,cx,cy,r*1.2);
  gl.addColorStop(0,'rgba(255,215,0,.4)');gl.addColorStop(1,'transparent');
  ctx.fillStyle=gl;ctx.beginPath();ctx.arc(cx,cy,r*1.2,0,Math.PI*2);ctx.fill();
  var g=ctx.createRadialGradient(cx-r*.3,cy-r*.3,r*.05,cx,cy,r);
  g.addColorStop(0,'#ffe566');g.addColorStop(.4,'#ffd740');g.addColorStop(1,'#e65100');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#bf360c';ctx.lineWidth=sz*.05;
  ctx.beginPath();ctx.arc(cx,cy,r-ctx.lineWidth/2,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#7f1800';
  ctx.font='bold '+Math.round(sz*.38)+'px Fredoka One,cursive';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('B',cx+sz*.02,cy+sz*.02);
  ctx.fillStyle='rgba(255,255,255,.6)';
  ctx.font='bold '+Math.round(sz*.36)+'px Fredoka One,cursive';
  ctx.fillText('B',cx,cy);
  var sh=ctx.createRadialGradient(cx-r*.25,cy-r*.32,0,cx-r*.1,cy-r*.15,r*.5);
  sh.addColorStop(0,'rgba(255,255,220,.6)');sh.addColorStop(1,'transparent');
  ctx.fillStyle=sh;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  ctx.textBaseline='alphabetic';
}

function drawTaskIcon(cv, type) {
  var sz=cv.width, ctx=cv.getContext('2d'); ctx.clearRect(0,0,sz,sz);
  var icons={'lines':'#40c4ff','combo':'#ffd740','score':'#ff5252','games':'#69f0ae','multiline':'#ea80fc'};
  var c=icons[type]||'#fff';
  // circle bg
  var g=ctx.createRadialGradient(sz*.4,sz*.35,1,sz/2,sz/2,sz/2);
  g.addColorStop(0,c);g.addColorStop(1,'rgba(0,0,0,.5)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(sz/2,sz/2,sz/2-1,0,Math.PI*2);ctx.fill();
  // icon letter
  ctx.fillStyle='#fff';ctx.font='bold '+Math.round(sz*.45)+'px Fredoka One,cursive';
  ctx.textAlign='center';ctx.textBaseline='middle';
  var letters={'lines':'L','combo':'C','score':'S','games':'G','multiline':'M'};
  ctx.fillText(letters[type]||'?',sz/2,sz/2+1);
  ctx.textBaseline='alphabetic';
}

function drawPlayArrow(cv, sz) {
  var ctx=cv.getContext('2d'); ctx.clearRect(0,0,sz,sz);
  ctx.fillStyle='rgba(255,255,255,.85)';
  ctx.beginPath();ctx.moveTo(sz*.22,sz*.15);ctx.lineTo(sz*.22,sz*.85);ctx.lineTo(sz*.88,sz*.5);ctx.closePath();ctx.fill();
}

function drawMenuIco(cv, type) {
  var sz=cv.width, ctx=cv.getContext('2d'); ctx.clearRect(0,0,sz,sz);
  var cols={'daily':'#ffd740','stat':'#40c4ff','rec':'#ff5252'};
  var c=cols[type]||'#fff';
  ctx.fillStyle=c;
  if(type==='daily'){
    // calendar icon
    ctx.fillStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.roundRect(2,4,sz-4,sz-6,4);ctx.fill();
    ctx.fillStyle=c;ctx.fillRect(4,2,8,5);ctx.fillRect(sz-12,2,8,5);
    ctx.fillStyle='rgba(255,255,255,.7)';
    for(var row=0;row<2;row++)for(var col=0;col<3;col++){
      ctx.fillRect(6+col*8,14+row*7,5,4);
    }
  } else if(type==='stat'){
    // bar chart
    [[4,22,8],[14,14,8],[24,8,8]].forEach(function(b){ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(b[0],b[1],b[2],sz-b[1]-2);
    ctx.fillStyle=c;ctx.fillRect(b[0],b[1],b[2],sz-b[1]-2);});
  } else if(type==='rec'){
    // trophy
    ctx.fillStyle=c;ctx.fillRect(sz*.4,sz*.72,sz*.2,sz*.16);
    ctx.fillRect(sz*.26,sz*.84,sz*.48,sz*.1);
    ctx.beginPath();ctx.arc(sz/2,sz*.4,sz*.3,Math.PI,Math.PI*2);
    ctx.lineTo(sz*.8,sz*.72);ctx.lineTo(sz*.2,sz*.72);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.4)';ctx.beginPath();ctx.arc(sz*.38,sz*.35,sz*.08,0,Math.PI*2);ctx.fill();
  }
}

function drawMenuPreview(cv) {
  var w=cv.width,h=cv.height,ctx=cv.getContext('2d');
  ctx.fillStyle='#0d47a1';ctx.fillRect(0,0,w,h);
  var cols=['#ff5252','#ffd740','#69f0ae','#40c4ff','#ea80fc'];
  var layout=[[0,0,1],[1,0,0],[0,1,2],[2,1,3],[1,2,4],[2,2,0]];
  var cs=16,pad=6;
  layout.forEach(function(b){
    var x=pad+b[0]*cs,y=pad+b[1]*cs,c=cols[b[2]];
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(x+1,y+2,cs-3,cs-3);
    ctx.fillStyle=c;ctx.fillRect(x,y,cs-2,cs-2);
    var g=ctx.createLinearGradient(x,y,x,y+(cs-2)*.5);
    g.addColorStop(0,'rgba(255,255,255,.45)');g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=g;ctx.fillRect(x,y,cs-2,cs-2);
  });
}

function drawLogo(cv) {
  var w=cv.width,h=cv.height,ctx=cv.getContext('2d');
  ctx.clearRect(0,0,w,h);
  // BLOCK
  var letters=[
    {ch:'B',x:10,col:'#ff5252',sh:'#b71c1c'},
    {ch:'L',x:62,col:'#ffd740',sh:'#e65100'},
    {ch:'O',x:108,col:'#ff4081',sh:'#c51162'},
    {ch:'C',x:160,col:'#29b6f6',sh:'#01579b'},
    {ch:'K',x:208,col:'#ab47bc',sh:'#4a148c'},
  ];
  var block2=[
    {ch:'B',x:18,col:'#40c4ff',sh:'#01579b'},
    {ch:'L',x:68,col:'#69f0ae',sh:'#1b5e20'},
    {ch:'A',x:118,col:'#ffd740',sh:'#e65100'},
    {ch:'S',x:170,col:'#ff5252',sh:'#b71c1c'},
    {ch:'T',x:220,col:'#ab47bc',sh:'#4a148c'},
  ];
  function drawLetter(ch,x,y,sz,col,sh){
    ctx.font='bold '+sz+'px Fredoka One,cursive';
    ctx.textAlign='left';ctx.textBaseline='alphabetic';
    // shadow
    ctx.fillStyle=sh;ctx.fillText(ch,x+2,y+4);
    // body
    var g=ctx.createLinearGradient(x,y-sz,x,y);
    g.addColorStop(0,'#fff');g.addColorStop(.3,col);g.addColorStop(1,sh);
    ctx.fillStyle=g;ctx.fillText(ch,x,y);
    // shine
    ctx.save();ctx.globalAlpha=.35;ctx.fillStyle='#fff';ctx.fillText(ch,x,y);ctx.restore();
  }
  letters.forEach(function(l){drawLetter(l.ch,l.x,50,44,l.col,l.sh);});
  block2.forEach(function(l){drawLetter(l.ch,l.x,98,38,l.col,l.sh);});
}

function sc(id,fn){ var el=document.getElementById(id); if(el) fn(el); }
function initCanvasIcons() {
  sc('hdrCrown',    function(cv){ drawCrown(cv,26,22,'#ffd740'); });
  sc('menuPlayArrow', function(cv){ drawPlayArrow(cv,36); });
  sc('menuDailyIco',  function(cv){ drawMenuIco(cv,'daily'); });
  sc('menuStatIco',   function(cv){ drawMenuIco(cv,'stat'); });
  sc('menuRecIco',    function(cv){ drawMenuIco(cv,'rec'); });
  sc('menuShopIco',   function(cv){ drawShopIcon(cv); });
  sc('menuPreview',   function(cv){ drawMenuPreview(cv); });
  sc('logoCanvas',    function(cv){ drawLogo(cv); });
  sc('pauseIco',      function(cv){ drawPauseIcon(cv,34,false); });
  sc('dailyCoinIco',  function(cv){ drawBlastCoin(cv,22); });
  sc('shopCoinIco',   function(cv){ drawBlastCoin(cv,26); });
}

// ══════════════════════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════════════════════
var ACtx=null;
function ac(){if(!ACtx)ACtx=new(window.AudioContext||window.webkitAudioContext)();if(ACtx.state==='suspended')ACtx.resume();return ACtx;}
function playNote(freq,type,vol,atk,sus,rel,delay){
  delay=delay||0;
  try{var ctx=ac(),t=ctx.currentTime+delay;
    var o=ctx.createOscillator(),g=ctx.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+atk);
    g.gain.setValueAtTime(vol,t+atk+sus);g.gain.exponentialRampToValueAtTime(.0001,t+atk+sus+rel);
    o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+atk+sus+rel+.01);
  }catch(e){}
}
function sfxPlace(){playNote(880,'sine',.18,.004,.01,.15);playNote(1174,'sine',.08,.004,.005,.1,.04);}
function sfxClear(n){[523,659,784,1047,1319].slice(0,Math.min(n+2,5)).forEach(function(f,i){playNote(f,'sine',.2,.005,.04,.22,i*.068);});}
function sfxCombo(lv){var r=[523,587,659,740,784,880][Math.min(lv-2,5)];playNote(r,'sine',.2,.005,.04,.28);playNote(r*1.26,'sine',.15,.005,.03,.22,.06);playNote(r*1.5,'sine',.12,.005,.02,.2,.12);}

var PCV=document.getElementById('pc'),PCX=PCV.getContext('2d'),parts=[];
function rsPC(){PCV.width=innerWidth;PCV.height=innerHeight;}
rsPC();addEventListener('resize',rsPC);

function spawnP(x,y,col,n){
  n=n||10;
  for(var i=0;i<n;i++){
    var a=Math.PI*2*i/n+Math.random()*.6,sp=2+Math.random()*5.5;
    parts.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,col:col,sz:3+Math.random()*5,life:1,dec:.024+Math.random()*.016,sq:Math.random()>.5});
  }
}
function spawnStar(x,y,col){
  for(var i=0;i<8;i++)parts.push({x:x,y:y,vx:(Math.random()-.5)*9,vy:-3-Math.random()*6,col:col||'#ffd740',sz:3+Math.random()*4,life:1,dec:.02,sq:false,star:true});
}
function spawnBurst(x,y,col){
  for(var i=0;i<20;i++){var a=Math.PI*2*i/20,sp=4+Math.random()*7;parts.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,col:col||'#ffd740',sz:3+Math.random()*5,life:1,dec:.022,sq:false});}
}
function tickP(){
  PCX.clearRect(0,0,PCV.width,PCV.height);
  parts=parts.filter(function(p){
    p.x+=p.vx;p.y+=p.vy;p.vy+=.16;p.vx*=.98;p.life-=p.dec;
    if(p.life<=0)return false;
    PCX.globalAlpha=Math.max(0,p.life*p.life);
    PCX.fillStyle=p.col;
    var s=Math.max(.1,p.sz*p.life);
    if(p.star){PCX.beginPath();for(var j=0;j<10;j++){var ang=Math.PI*2*j/10-Math.PI/2,rr=j%2===0?s:s/2.3;j===0?PCX.moveTo(p.x+Math.cos(ang)*rr,p.y+Math.sin(ang)*rr):PCX.lineTo(p.x+Math.cos(ang)*rr,p.y+Math.sin(ang)*rr);}PCX.closePath();PCX.fill();}
    else if(p.sq)PCX.fillRect(p.x-s/2,p.y-s/2,s,s);
    else{PCX.beginPath();PCX.arc(p.x,p.y,Math.max(.1,s/2),0,Math.PI*2);PCX.fill();}
    return true;
  });
  PCX.globalAlpha=1;
}

function spawnShards(cx,cy,col,count){
  count=count||6;
  for(var i=0;i<count;i++){
    var el=document.createElement('div');el.className='shard';
    var ang=Math.random()*Math.PI*2,dist=40+Math.random()*70;
    var sz=4+Math.random()*7,dur=.45+Math.random()*.3;
    el.style.cssText='left:'+(cx-sz/2)+'px;top:'+(cy-sz/2)+'px;width:'+sz+'px;height:'+sz+'px;background:'+col+';--dx:'+(Math.cos(ang)*dist).toFixed(0)+'px;--dy:'+(Math.sin(ang)*dist).toFixed(0)+'px;--rot:'+(Math.random()*360).toFixed(0)+'deg;--dur:'+dur.toFixed(2)+'s;border-radius:'+(Math.random()>.5?'50%':'3px')+';';
    document.body.appendChild(el);
    setTimeout(function(e){e.remove();},(dur*1000+50)|0,el);
  }
}

var COLS=BOARD_THEMES[0].cols;

function drawBlock(ctx,px,py,col,cs){
  BOARD_THEMES[boardThemeIdx].draw(ctx,px,py,col,cs);
}

function applyBoardTheme(idx){
  idx=((idx%BOARD_THEMES.length)+BOARD_THEMES.length)%BOARD_THEMES.length;
  boardThemeIdx=idx;
  var t=BOARD_THEMES[idx];
  document.getElementById('sGame').style.background=t.bg;
  COLS=t.cols;
  var fl=document.createElement('div');
  fl.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:250;background:radial-gradient(ellipse at 50% 40%,rgba(255,255,255,.4),transparent 65%);animation:sflash .55s ease forwards';
  document.body.appendChild(fl);setTimeout(function(){fl.remove();},600);
  _seed=Date.now()|0;
  if(grid)for(var r=0;r<GS;r++)for(var c=0;c<GS;c++)if(grid[r][c])grid[r][c]=COLS[rngInt(COLS.length)];
  if(pieces&&pieces[0])renderAllPieces();
}

function onLinesClear(total){
  linesClearedTotal+=total;
  if(total>=2){
    applyBoardTheme(boardThemeIdx+1);
  }
}

function rrect(ctx,x,y,w,h,r){
  w=Math.max(0,w);h=Math.max(0,h);r=Math.max(0,Math.min(r,w/2,h/2));
  if(w<1||h<1)return;
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function getPreviewClear(){
  if(!drag.active||!canPlace(drag.cells))return{rows:[],cols:[]};
  var temp=[];for(var r=0;r<GS;r++){temp[r]=[];for(var c=0;c<GS;c++)temp[r][c]=grid[r][c];}
  drag.cells.forEach(function(cell){if(cell.r>=0&&cell.r<GS&&cell.c>=0&&cell.c<GS)temp[cell.r][cell.c]=true;});
  var rows=[],cols=[];
  for(var r2=0;r2<GS;r2++){var f=true;for(var c2=0;c2<GS;c2++)if(!temp[r2][c2]){f=false;break;}if(f)rows.push(r2);}
  for(var cc=0;cc<GS;cc++){var f2=true;for(var rr=0;rr<GS;rr++)if(!temp[rr][cc]){f2=false;break;}if(f2)cols.push(cc);}
  return{rows:rows,cols:cols};
}

function drawGrid(){
  var sz=CELL*GS;
  gridPulse+=.025;
  var t=BOARD_THEMES[boardThemeIdx];

  // background
  GCX.fillStyle=t.gridBg||'rgba(0,0,40,.6)';
  rrect(GCX,0,0,sz,sz,16);GCX.fill();

  // preview
  var prev=getPreviewClear();
  var clearRows={},clearCols={};
  prev.rows.forEach(function(r){clearRows[r]=true;});
  prev.cols.forEach(function(c){clearCols[c]=true;});
  var hasClear=prev.rows.length>0||prev.cols.length>0;
  var validDrop=drag.active&&canPlace(drag.cells);
  var ghostMap={};
  if(validDrop)drag.cells.forEach(function(cell){if(cell.r>=0&&cell.r<GS&&cell.c>=0&&cell.c<GS)ghostMap[cell.r+','+cell.c]=true;});

  // cells
  for(var r=0;r<GS;r++){
    for(var c=0;c<GS;c++){
      GCX.fillStyle=(r+c)%2===0?'rgba(255,255,255,.04)':'rgba(255,255,255,.02)';
      rrect(GCX,c*CELL+1,r*CELL+1,CELL-2,CELL-2,4);GCX.fill();
    }
  }

  // grid lines
  GCX.strokeStyle='rgba(255,255,255,.07)';GCX.lineWidth=1;
  for(var i=0;i<=GS;i++){
    GCX.beginPath();GCX.moveTo(i*CELL,0);GCX.lineTo(i*CELL,sz);GCX.stroke();
    GCX.beginPath();GCX.moveTo(0,i*CELL);GCX.lineTo(sz,i*CELL);GCX.stroke();
  }

  // line clear glow — soft color highlight, NO white flash
  if(hasClear&&validDrop){
    var pulse=.4+.25*Math.sin(gridPulse*4);
    var col=drag.col;
    prev.rows.forEach(function(r2){
      GCX.save();
      GCX.globalAlpha=pulse*.5;
      GCX.fillStyle=col.f;
      GCX.fillRect(0,r2*CELL,sz,CELL);
      GCX.restore();
      GCX.save();
      GCX.globalAlpha=pulse*.8;
      GCX.strokeStyle=col.f;GCX.lineWidth=2;
      GCX.shadowColor=col.f;GCX.shadowBlur=8;
      GCX.beginPath();GCX.moveTo(2,r2*CELL+.5);GCX.lineTo(sz-2,r2*CELL+.5);GCX.stroke();
      GCX.beginPath();GCX.moveTo(2,(r2+1)*CELL-.5);GCX.lineTo(sz-2,(r2+1)*CELL-.5);GCX.stroke();
      GCX.shadowBlur=0;GCX.restore();
    });
    prev.cols.forEach(function(c2){
      GCX.save();
      GCX.globalAlpha=pulse*.5;
      GCX.fillStyle=col.f;
      GCX.fillRect(c2*CELL,0,CELL,sz);
      GCX.restore();
      GCX.save();
      GCX.globalAlpha=pulse*.8;
      GCX.strokeStyle=col.f;GCX.lineWidth=2;
      GCX.shadowColor=col.f;GCX.shadowBlur=8;
      GCX.beginPath();GCX.moveTo(c2*CELL+.5,2);GCX.lineTo(c2*CELL+.5,sz-2);GCX.stroke();
      GCX.beginPath();GCX.moveTo((c2+1)*CELL-.5,2);GCX.lineTo((c2+1)*CELL-.5,sz-2);GCX.stroke();
      GCX.shadowBlur=0;GCX.restore();
    });
  }

  // placed blocks
  for(var rr=0;rr<GS;rr++)for(var cc=0;cc<GS;cc++)if(grid[rr][cc])drawBlock(GCX,cc*CELL,rr*CELL,grid[rr][cc],CELL);

  // ghost
  if(drag.active){
    if(validDrop){
      drag.cells.forEach(function(cell){
        if(cell.r<0||cell.r>=GS||cell.c<0||cell.c>=GS)return;
        var onClear=clearRows[cell.r]||clearCols[cell.c];
        GCX.save();GCX.globalAlpha=onClear?1:.62;
        drawBlock(GCX,cell.c*CELL,cell.r*CELL,drag.col,CELL);GCX.restore();
      });
    } else {
      drag.cells.forEach(function(cell){
        if(cell.r<0||cell.r>=GS||cell.c<0||cell.c>=GS)return;
        GCX.fillStyle='rgba(255,50,50,.2)';
        rrect(GCX,cell.c*CELL+1,cell.r*CELL+1,CELL-2,CELL-2,Math.max(0,CELL*.18));GCX.fill();
      });
    }
  }
}

function maxRC(cells){var mr=0,mc=0;cells.forEach(function(c){if(c.r>mr)mr=c.r;if(c.c>mc)mc=c.c;});return{rows:mr+1,cols:mc+1};}

function pieceCell(cells){
  var dim=maxRC(cells);
  var slotW=document.getElementById('ps0').clientWidth||88;
  var tc=Math.floor(CELL*.82);
  tc=Math.min(tc,Math.floor((slotW-12)/dim.cols),Math.floor(88/dim.rows));
  return Math.max(10,tc);
}

function fitsAnywhere(cells){
  var dim=maxRC(cells);
  for(var sr=0;sr<=GS-dim.rows;sr++)
    for(var sc=0;sc<=GS-dim.cols;sc++){
      var ok=true;
      for(var i=0;i<cells.length&&ok;i++)if(grid[sr+cells[i].r][sc+cells[i].c])ok=false;
      if(ok)return true;
    }
  return false;
}

function updateSlotFitHints(){
  for(var i=0;i<3;i++){
    var slot=document.getElementById('ps'+i);var p=pieces[i];
    slot.classList.remove('canfit','cantfit');
    if(!p||p.used)continue;
    if(fitsAnywhere(p.cells))slot.classList.add('canfit');
    else slot.classList.add('cantfit');
  }
}

function renderPiece(idx){
  var p=pieces[idx],slot=document.getElementById('ps'+idx),cv=document.getElementById('pc'+idx);
  if(!cv||!slot)return;
  var ctx2=cv.getContext('2d');
  slot.classList.remove('used','dragging','canfit','cantfit');
  if(!p||p.used){slot.classList.add('used');cv.width=2;cv.height=2;ctx2.clearRect(0,0,2,2);return;}
  var tc=pieceCell(p.cells),dim=maxRC(p.cells);
  cv.width=dim.cols*tc;cv.height=dim.rows*tc;
  cv.style.width=cv.width+'px';cv.style.height=cv.height+'px';
  ctx2.clearRect(0,0,cv.width,cv.height);
  p.cells.forEach(function(cell){drawBlock(ctx2,cell.c*tc,cell.r*tc,p.color,tc);});
}
function renderAllPieces(){renderPiece(0);renderPiece(1);renderPiece(2);setTimeout(updateSlotFitHints,60);}

// SMART PIECE GENERATOR
// ══════════════════════════════════════════════════════════
var _seed=Date.now(),_lastShapes=[];
function rng(){_seed=(_seed*1664525+1013904223)&0xffffffff;return((_seed>>>0)/4294967296);}
function rngInt(max){return Math.floor(rng()*max);}

// ── Difficulty curve (0.0 = max help, 1.0 = pure random / hostile) ──
// 0–2k   : 0.00–0.10  (almost always perfect fits)
// 2k–10k : 0.10–0.35  (mostly helpful)
// 10k–30k: 0.35–0.65  (balanced)
// 30k–60k: 0.65–0.85  (harder)
// 60k+   : 0.85–1.00  (brutal)
function getDifficulty(){
  var s=score||0;
  if(s<2000)   return s/2000*0.10;
  if(s<10000)  return 0.10+(s-2000)/8000*0.25;
  if(s<30000)  return 0.35+(s-10000)/20000*0.30;
  if(s<60000)  return 0.65+(s-30000)/30000*0.20;
  return Math.min(0.85+(s-60000)/40000*0.15, 1.0);
}

function analyzeGrid(){
  var filled=0,emptyRows=[],emptyCols=[];
  for(var r=0;r<GS;r++){
    var rf=0;for(var c=0;c<GS;c++)if(grid[r][c]){filled++;rf++;}
    emptyRows.push(GS-rf);
  }
  for(var c2=0;c2<GS;c2++){
    var cf=0;for(var r2=0;r2<GS;r2++)if(grid[r2][c2])cf++;
    emptyCols.push(GS-cf);
  }
  return{
    fillPct:filled/(GS*GS),
    nearRows:emptyRows.filter(function(e){return e>0&&e<=3;}).length,
    nearCols:emptyCols.filter(function(e){return e>0&&e<=3;}).length,
    emptyRows:emptyRows, emptyCols:emptyCols
  };
}

// Score a shape: how much it HELPS the player right now
// Higher = better for player
function scoreShape(cells){
  var a=analyzeGrid(), s2=0, size=cells.length;
  var rowSpan={}, colSpan={};
  cells.forEach(function(cell){rowSpan[cell.r]=true; colSpan[cell.c]=true;});
  var ur=Object.keys(rowSpan).length, uc=Object.keys(colSpan).length;

  // MUST fit somewhere
  if(!fitsAnywhere(cells)) return -9999;

  // Reward fitting cells: small pieces on crowded board
  s2 += size * 3;
  if(a.fillPct > 0.6 && size <= 2) s2 += 40;
  if(a.fillPct > 0.7 && size <= 3) s2 += 30;

  // Penalise large pieces on crowded board
  if(a.fillPct > 0.65 && size >= 5) s2 -= 35;
  if(a.fillPct > 0.75 && size >= 4) s2 -= 25;

  // Reward pieces that complete lines
  // Horizontal piece (1 row) → helps near-full rows
  if(ur===1 && a.nearRows>0) s2 += 50 + a.nearRows*15;
  // Vertical piece (1 col) → helps near-full cols
  if(uc===1 && a.nearCols>0) s2 += 50 + a.nearCols*15;
  // Compact square fills multiple near-rows
  if(ur<=2 && uc<=2 && a.nearRows>=2) s2 += 30;

  // Small bonus for any near-line possibility
  s2 += a.nearRows*5 + a.nearCols*5;

  return s2;
}

function pickShape(){
  var diff = getDifficulty();
  var a = analyzeGrid();

  // Always rescue player from near-death regardless of difficulty
  var mustRescue = a.fillPct > 0.75;

  // Generate candidate pool — more candidates at low diff for better selection
  var poolSize = 12;
  var candidates = [];
  for(var i=0;i<poolSize;i++){
    var idx=rngInt(SHAPES.length);
    var cells=SHAPES[idx].map(function(c){return{r:c.r,c:c.c};});
    var sc2=scoreShape(cells);
    if(sc2>-9999) candidates.push({idx:idx, score:sc2});
  }

  // If no valid shape found, try more
  var extra=0;
  while(candidates.length<3&&extra<20){
    var idx2=rngInt(SHAPES.length);
    var cells2=SHAPES[idx2].map(function(c){return{r:c.r,c:c.c};});
    if(fitsAnywhere(cells2)) candidates.push({idx:idx2,score:scoreShape(cells2)});
    extra++;
  }
  if(!candidates.length) return SHAPES[rngInt(SHAPES.length)];

  candidates.sort(function(a,b){return b.score-a.score;});
  var n=candidates.length;

  var pickIdx;
  if(mustRescue){
    // Emergency: always best shape
    pickIdx = 0;
  } else {
    // Interpolate: diff=0 → always top, diff=1 → uniform random
    // At diff=d, pick from top (1-d)*n shapes with weighted bias
    var topRange = Math.max(1, Math.round(n * (1 - diff * 0.85)));
    // Within that range, bias toward top: lower diff = stronger bias to #1
    var bias = Math.pow(rng(), 0.3 + diff * 2.5); // diff=0: ^0.3 (heavy top bias), diff=1: ^2.8 (bottom bias)
    pickIdx = Math.floor(bias * topRange);
    pickIdx = Math.min(pickIdx, n-1);
  }

  return SHAPES[candidates[pickIdx].idx];
}

function pickShapeNoRepeat(){
  var attempts=0, sh;
  do{
    sh=pickShape(); attempts++;
    var key=JSON.stringify(sh);
    var repLarge=_lastShapes.slice(-3).filter(function(k){return k===key;}).length;
    if(sh.length<5||repLarge<2||attempts>6) break;
  }while(attempts<10);
  _lastShapes.push(JSON.stringify(sh));
  if(_lastShapes.length>12)_lastShapes.shift();
  return sh;
}

// Debug helper (remove in prod): show difficulty level
// console.log('diff', getDifficulty().toFixed(2));


function spawnPieces(){
  for(var i=0;i<3;i++){
    var sh=pickShapeNoRepeat();
    pieces[i]={cells:sh.map(function(c){return{r:c.r,c:c.c};}),color:COLS[rngInt(COLS.length)],used:false};
  }
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    renderAllPieces();
    [0,1,2].forEach(function(i){(function(idx){
      var slot=document.getElementById('ps'+idx);if(!slot)return;
      slot.classList.remove('spawning');void slot.offsetWidth;
      slot.style.animationDelay=(idx*.08)+'s';slot.classList.add('spawning');
      setTimeout(function(){if(slot){slot.classList.remove('spawning');slot.style.animationDelay='';}},500);
    })(i);});
  });});
}

var DG=document.getElementById('dg'),DGX=DG.getContext('2d');
var drag={active:false,idx:-1,cells:[],col:null};

function startDrag(idx,cx,cy){
  var p=pieces[idx];if(!p||p.used||paused||dead)return;
  haptic('click');sfxClick();
  drag.active=true;drag.idx=idx;drag.col=p.color;
  var dim=maxRC(p.cells);
  DG.width=dim.cols*CELL;DG.height=dim.rows*CELL;
  DGX.clearRect(0,0,DG.width,DG.height);
  p.cells.forEach(function(cell){drawBlock(DGX,cell.c*CELL,cell.r*CELL,p.color,CELL);});
  DG.style.display='block';
  document.getElementById('ps'+idx).classList.add('dragging');
  updateDrag(cx,cy);
}

function updateDrag(cx,cy){
  if(!drag.active)return;
  DG.style.left=(cx-DG.width/2)+'px';
  DG.style.top=(cy-DG.height/2-55)+'px';
  var rect=GC.getBoundingClientRect();
  var ox=cx-DG.width/2-rect.left,oy=cy-DG.height/2-55-rect.top;
  drag.cells=pieces[drag.idx].cells.map(function(cell){
    return{r:Math.round(oy/CELL)+cell.r,c:Math.round(ox/CELL)+cell.c};
  });
}

function endDrag(cx,cy){
  if(!drag.active)return;
  updateDrag(cx,cy);
  DG.style.display='none';
  document.getElementById('ps'+drag.idx).classList.remove('dragging');
  if(canPlace(drag.cells))placePiece();
  else{sfxNo();haptic('no');renderPiece(drag.idx);}
  drag.active=false;drag.cells=[];
}

function canPlace(cells){
  if(!cells||!cells.length)return false;
  for(var i=0;i<cells.length;i++){var r=cells[i].r,c=cells[i].c;if(r<0||r>=GS||c<0||c>=GS||grid[r][c])return false;}
  return true;
}

function placePiece(){
  var p=pieces[drag.idx];
  drag.cells.forEach(function(cell){grid[cell.r][cell.c]=p.color;});
  p.used=true;placedPieces++;
  sfxPlace();haptic('place');
  addScore(drag.cells.length*2);
  var rect=GC.getBoundingClientRect();
  drag.cells.forEach(function(cell){spawnP(rect.left+cell.c*CELL+CELL/2,rect.top+cell.r*CELL+CELL/2,p.color.f,4);});
  renderAllPieces();
  updateFillMeter();
  clearLines();
  if(pieces.every(function(pp){return pp.used;}))setTimeout(spawnPieces,320);
  setTimeout(checkDead,450);
}

var PRAISE=[
  [],

  ['Хорошо!','Неплохо!'],

  ['Великолепно!','Браво!'],

  ['Потрясающе!','Мастерски!'],
  ['ЛЕГЕНДАРНО!','ЭПИЧНО!'],
];
var PRAISE_COLS=['','','#ffd740','#69f0ae','#40c4ff','#ea80fc','#ff4081','#ff6e40','#fff'];

function showPraise(total){
  var arr=PRAISE[Math.min(total,PRAISE.length-1)];
  if(!arr||!arr.length)return;
  var txt=arr[Math.floor(Math.random()*arr.length)];
  var col=PRAISE_COLS[Math.min(total,PRAISE_COLS.length-1)];
  var el=document.createElement('div');
  el.className='praise-pop';
  el.style.color=col;
  el.style.fontSize=Math.min(22+total*3,38)+'px';
  el.style.textShadow='0 3px 16px '+col+'88';
  el.textContent=txt;
  document.body.appendChild(el);
  setTimeout(function(){el.remove();},950);
}

function clearLines(){
  var rows=[],cols=[];
  for(var r=0;r<GS;r++){var ok=true;for(var c=0;c<GS;c++)if(!grid[r][c]){ok=false;break;}if(ok)rows.push(r);}
  for(var cc=0;cc<GS;cc++){var ok2=true;for(var rr=0;rr<GS;rr++)if(!grid[rr][cc]){ok2=false;break;}if(ok2)cols.push(cc);}
  var total=rows.length+cols.length;
  if(!total){combo=0;updateComboUI(0);return;}

  combo+=total;
  if(combo>maxCombo)maxCombo=combo;
  totalLines+=total;
  updateDailyProgress('lines',total);
  if(total>=2)updateDailyProgress('multiline',total);
  updateDailyProgress('combo',combo);

  var base=total*GS*10;
  var comboMult=combo>1?1+(combo-1)*.5:1;
  var pts=Math.floor(base*comboMult);
  addScore(pts);
  showFS(pts,rows,cols);
  showPraise(total);
  flashLines(rows,cols);
  sfxClear(total);haptic(combo>=3?'combo':'clear');
  if(combo>1)sfxCombo(Math.min(combo,8));
  updateComboUI(combo);

  var rect=GC.getBoundingClientRect();
  var midX=rect.left+GS*CELL/2,midY=rect.top+GS*CELL/2;
  rows.forEach(function(r){
    for(var c=0;c<GS;c++)spawnP(rect.left+c*CELL+CELL/2,rect.top+r*CELL+CELL/2,grid[r][c]?grid[r][c].f:'#ffd740',8);
    spawnStar(rect.left+GS*CELL/2,rect.top+r*CELL+CELL/2,drag.col?drag.col.sh:'#ffd740');
    for(var c2=0;c2<GS;c2+=2){var col3=grid[r][c2];if(col3)spawnShards(rect.left+c2*CELL+CELL/2,rect.top+r*CELL+CELL/2,col3.f,4);}
  });
  cols.forEach(function(c){
    for(var r=0;r<GS;r++)spawnP(rect.left+c*CELL+CELL/2,rect.top+r*CELL+CELL/2,grid[r][c]?grid[r][c].f:'#40c4ff',8);
    spawnStar(rect.left+c*CELL+CELL/2,rect.top+GS*CELL/2,'#40c4ff');
    for(var r2=0;r2<GS;r2+=2){var col4=grid[r2][c];if(col4)spawnShards(rect.left+c*CELL+CELL/2,rect.top+r2*CELL+CELL/2,col4.f,4);}
  });
  if(total>=2)spawnBurst(midX,midY,drag.col?drag.col.f:'#ffd740');

  setTimeout(function(){
    rows.forEach(function(r){grid[r]=new Array(GS).fill(null);});
    cols.forEach(function(c){for(var r=0;r<GS;r++)grid[r][c]=null;});
    updateFillMeter();
    updateSlotFitHints();
    onLinesClear(total);
  },210);
}

function flashLines(rows,cols){
  var wrap=document.getElementById('gwrap');
  var wr=wrap.getBoundingClientRect(),cr=GC.getBoundingClientRect();
  var ox=cr.left-wr.left,oy=cr.top-wr.top;
  var flashCol=drag.col?drag.col.f:'#ffd740';
  rows.forEach(function(r){
    var el=document.createElement('div');el.className='lfl';
    el.style.cssText='position:absolute;left:'+ox+'px;top:'+(oy+r*CELL)+'px;width:'+(CELL*GS)+'px;height:'+CELL+'px;border-radius:4px;background:'+flashCol+'44';
    wrap.appendChild(el);setTimeout(function(){el.remove();},450);
  });
  cols.forEach(function(c){
    var el=document.createElement('div');el.className='lfl';
    el.style.cssText='position:absolute;left:'+(ox+c*CELL)+'px;top:'+oy+'px;width:'+CELL+'px;height:'+(CELL*GS)+'px;border-radius:4px;background:'+flashCol+'44';
    wrap.appendChild(el);setTimeout(function(){el.remove();},450);
  });
}

// HUD
// ══════════════════════════════════════════════════════════
var _dispScore=0,_scoreRaf=null;
function addScore(n){
  score+=n;
  if(score>best){
    var wasNew=best===0||score-n<=best;
    best=score;
    if(wasNew&&score>0){document.getElementById('gbs').style.color='#ffd740';flashScreen();}
  }
  updateDailyProgress('score',n);
  updateHUD();
}
function flashScreen(){
  var el=document.createElement('div');el.className='score-flash';
  document.body.appendChild(el);setTimeout(function(){el.remove();},450);
}
function updateHUD(){
  var target=score,el=document.getElementById('gsc');
  if(_scoreRaf)cancelAnimationFrame(_scoreRaf);
  var start=_dispScore,diff=target-start;
  if(Math.abs(diff)<5){_dispScore=target;el.textContent=target.toLocaleString();}
  else{var steps=0,maxS=16;(function roll(){steps++;_dispScore=Math.round(start+diff*(steps/maxS));el.textContent=_dispScore.toLocaleString();if(steps<maxS)_scoreRaf=requestAnimationFrame(roll);else{_dispScore=target;el.textContent=target.toLocaleString();}})();}
  el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');
  document.getElementById('gbs').textContent=(best||0).toLocaleString();
}

function updateComboUI(c){
  var lbl=document.getElementById('comboLbl'),num=document.getElementById('comboNum');
  if(c<=1){lbl.classList.remove('on');num.classList.remove('on');return;}
  num.textContent=c;
  lbl.classList.remove('on');num.classList.remove('on');
  void lbl.offsetWidth;
  lbl.classList.add('on');num.classList.add('on');
}

function updateFillMeter(){
  var filled=0;
  for(var r=0;r<GS;r++)for(var c=0;c<GS;c++)if(grid[r][c])filled++;
  var pct=Math.round(filled/(GS*GS)*100);
  var bar=document.getElementById('fillBar');
  bar.style.width=pct+'%';
  if(pct>75)bar.style.background='linear-gradient(90deg,#ff5252,#ff9100)';
  else if(pct>50)bar.style.background='linear-gradient(90deg,#ffd740,#ff5252)';
  else bar.style.background='linear-gradient(90deg,#69f0ae,#40c4ff)';
}

function showFS(pts,rows,cols){
  var total=(rows?rows.length:0)+(cols?cols.length:0);
  var col=total>=3?'#ea80fc':total>=2?'#40c4ff':'#ffd740';
  var sz=18+total*5;
  var cr=GC.getBoundingClientRect();
  var startX=cr.left+cr.width/2-28,startY=cr.top+cr.height*.2;
  var el=document.createElement('div');
  el.className='score-fly';
  el.textContent='+'+pts.toLocaleString();
  el.style.cssText='left:'+startX+'px;top:'+startY+'px;font-size:'+sz+'px;color:'+col+';opacity:1;';
  document.body.appendChild(el);
  var tRect=document.getElementById('gsc').getBoundingClientRect();
  var tx=tRect.left+tRect.width/2-28,ty=tRect.top;
  var st=null,dur=700;
  requestAnimationFrame(function step(ts){
    if(!st)st=ts;
    var prog=Math.min((ts-st)/dur,1);
    var e=prog<.2?0:((prog-.2)/.8);var ease=1-Math.pow(1-e,3);
    el.style.left=(startX+(tx-startX)*ease)+'px';
    el.style.top=(startY+(ty-startY)*ease)+'px';
    el.style.transform='scale('+(1-ease*.5)+')';
    el.style.opacity=prog<.15?1:1-(prog-.15)/.85;
    if(prog<1)requestAnimationFrame(step);else el.remove();
  });
}

function checkDead(){
  if(dead)return;
  var avail=pieces.filter(function(p){return p&&!p.used;});
  if(!avail.length)return;
  if(avail.every(function(p){return!fitsAnywhere(p.cells);}))doDead();
}

function doDead(){
  dead=true;sfxDead();haptic('dead');
  saveBestStreak(maxCombo);
  recordGameStat(score,totalLines,maxCombo);
  updateDailyProgress('games',1);
  var isNew=saveRec(score);
  if(isNew&&score>0)setTimeout(sfxNewBest,900);
  // Update menu best immediately so it shows when returning to menu
  var bel=document.getElementById('menuBestVal');
  if(bel)bel.textContent=(getBest()||0).toLocaleString();
  document.getElementById('ovSc').textContent=score.toLocaleString();
  document.getElementById('ovLines').textContent=totalLines;
  document.getElementById('ovCombo').textContent=maxCombo+'x';
  document.getElementById('ovBs').textContent=(best||0).toLocaleString();
  document.getElementById('nrb').style.display=isNew&&score>0?'block':'none';
  setTimeout(function(){document.getElementById('ovD').classList.add('on');},800);
}

function getRecs(){
  try{
    // Try all storage keys, merge and return best
    var keys=['bb8','bb7','bb6','bb_recs'];
    var all=[];
    keys.forEach(function(k){try{var d=JSON.parse(localStorage.getItem(k)||'[]');if(Array.isArray(d))all=all.concat(d);}catch(e){}});
    all.sort(function(a,b){return b.score-a.score;});
    // Deduplicate by score
    var seen={},out=[];
    all.forEach(function(x){if(!seen[x.score]){seen[x.score]=true;out.push(x);}});
    return out.slice(0,10);
  }catch(e){return[];}
}
function saveRec(s){
  if(!s||s<=0)return false;
  var r=getRecs();r=r.filter(function(x){return x.score!==s;});
  r.push({score:s,date:new Date().toLocaleDateString('ru')});
  r.sort(function(a,b){return b.score-a.score;});r=r.slice(0,10);
  localStorage.setItem('bb8',JSON.stringify(r));
  return r[0].score===s;
}
function getBest(){var r=getRecs();return r.length?r[0].score:0;}
function getBestStreak(){try{return parseInt(localStorage.getItem('bb8s')||'0');}catch(e){return 0;}}

function getTodayKey(){return new Date().toISOString().slice(0,10);}
function getDailyData(){
  try{var d=JSON.parse(localStorage.getItem('bb8d')||'{}');
  if(d.day!==getTodayKey())d={day:getTodayKey(),tasks:{},claimed:{}};return d;}
  catch(e){return{day:getTodayKey(),tasks:{},claimed:{}};}
}
function saveDailyData(d){try{localStorage.setItem('bb8d',JSON.stringify(d));}catch(e){}}
function getTodayTasks(){
  var key=getTodayKey(),seed2=key.split('-').reduce(function(a,b){return parseInt(a)*100+parseInt(b);},0);
  var pool=TASK_DEFS.slice(),idxs=[];
  for(var i=0;i<3;i++){var pick=(seed2*397+i*1234)%pool.length;idxs.push(pool[pick]);pool.splice(pick,1);}
  return idxs;
}
function updateDailyProgress(type,val){
  var d=getDailyData();
  getTodayTasks().forEach(function(t){
    if(t.type!==type||d.claimed[t.id])return;
    var cur=d.tasks[t.id]||0;
    if(type==='multiline'){if(val>=t.target)d.tasks[t.id]=t.target;}
    else if(type==='score'||type==='lines'||type==='games')d.tasks[t.id]=Math.min(cur+val,t.target);
    else if(type==='combo')d.tasks[t.id]=Math.max(cur,Math.min(val,t.target));
  });
  saveDailyData(d);
  updateDailySubLbl();
}
function claimTask(taskId){
  var d=getDailyData();if(d.claimed[taskId])return;
  var t=TASK_DEFS.find(function(x){return x.id===taskId;});if(!t)return;
  if((d.tasks[taskId]||0)<t.target)return;
  d.claimed[taskId]=true;saveDailyData(d);addCoins(t.reward);renderDaily();
}
function updateDailySubLbl(){
  var d=getDailyData(),tasks=getTodayTasks();
  var done=tasks.filter(function(t){return(d.tasks[t.id]||0)>=t.target;}).length;
  var el=document.getElementById('dailySubLbl');
  if(el)el.textContent=done+'/'+tasks.length+' выполнено';
}

      '<div class="task-reward"><canvas id="task-r-'+i+'" width="18" height="18" style="display:block;margin:0 auto 2px"></canvas>'+t.reward+'</div>'+
      (claimed?'<div class="task-claimed" style="font-size:20px;color:#69f0ae">✓</div>':done?'<button class="task-claim" onclick="claimTask(\''+t.id+'\')">Забрать</button>':'')+
      '</div>';
  }).join('');
  // draw icons AFTER DOM is updated
  requestAnimationFrame(function(){
    tasks.forEach(function(t,i){
      var ico=document.getElementById('task-ico-'+i);
      var rew=document.getElementById('task-r-'+i);
      if(ico) drawTaskIcon(ico,t.type);
      if(rew) drawBlastCoin(rew,18);
    });
  });
}

function lerpCol(p,t){
  var i=t*(p.length-1),lo=Math.floor(i),hi=Math.min(lo+1,p.length-1),f=i-lo;
  function h(s){return[parseInt(s.slice(1,3),16)||0,parseInt(s.slice(3,5),16)||0,parseInt(s.slice(5,7),16)||0];}
  var a=h(p[lo].length<=5?p[lo]+'0':p[lo]),b=h(p[hi].length<=5?p[hi]+'0':p[hi]);
  return 'rgb('+Math.round(a[0]+(b[0]-a[0])*f)+','+Math.round(a[1]+(b[1]-a[1])*f)+','+Math.round(a[2]+(b[2]-a[2])*f)+')';

function startFireCanvas(streakCount){
  stopFireCanvas();fireLevel=streakCount;

  var li=Math.min(streakCount-2,FIRE_LEVELS.length-1),cfg=FIRE_LEVELS[li];

  cv.style.width=cv.width+'px';cv.style.height=cv.height+'px';
  var ctx=cv.getContext('2d');fireParticles=[];
  (function tick(){
    ctx.clearRect(0,0,cv.width,cv.height);
    var l2=Math.min(fireLevel-2,FIRE_LEVELS.length-1),c=FIRE_LEVELS[l2];
    for(var s=0;s<c.spawn;s++){

    if(c.sparks&&rng()<.4)for(var k=0;k<Math.ceil(c.sparks*.5);k++)fireParticles.push({type:'spark',x:cv.width/2+(rng()-.5)*cv.width*.3,y:cv.height-4,vx:(rng()-.5)*c.spread*2.5,vy:-(c.spd*1.4+rng()*1.5),life:1,decay:.028+rng()*.02,size:1+rng()*1.5,col:c.pal[Math.floor(rng()*c.pal.length)]});
    if(fireParticles.length>350)fireParticles.splice(0,fireParticles.length-350);
    fireParticles=fireParticles.filter(function(p){
      p.x+=p.vx+(p.wx||0);p.y+=p.vy;p.vy+=.03;p.vx+=(rng()-.5)*.04;p.life-=p.decay;
      if(p.life<=0)return false;
      ctx.save();
      if(p.type==='spark'){ctx.globalAlpha=p.life*p.life;ctx.shadowColor=p.col;ctx.shadowBlur=4;ctx.fillStyle=p.life>.5?'#fff':p.col;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.3,p.size*p.life),0,Math.PI*2);ctx.fill();}
      else{var t2=1-p.life,col2=lerpCol(c.pal,t2),r2=Math.max(.4,p.size*p.life);ctx.globalAlpha=p.life*p.life*.92;if(c.glow>0){ctx.shadowColor=col2;ctx.shadowBlur=c.glow*(.5+p.life*.5);}ctx.fillStyle=col2;ctx.beginPath();ctx.arc(p.x,p.y,r2,0,Math.PI*2);ctx.fill();if(c.core&&p.life>.6){ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,'+(p.life-.6)*2+')';ctx.globalAlpha=(p.life-.6)*2.5;ctx.beginPath();ctx.arc(p.x,p.y,r2*.28,0,Math.PI*2);ctx.fill();}}
      ctx.restore();return true;
    });
    ctx.globalAlpha=1;fireRaf=requestAnimationFrame(tick);
  })();
}
function stopFireCanvas(){if(fireRaf){cancelAnimationFrame(fireRaf);fireRaf=null;}fireParticles=[];var cv=document.getElementById('fireCanvas');if(cv)cv.getContext('2d').clearRect(0,0,cv.width,cv.height);}

var menuRaf=null,menuPieces=[];
var MS=14;
var MENU_SHAPES=SHAPES.filter(function(s){return s.length>=2&&s.length<=6;});

function setupMenu(){
  drawCrown(document.getElementById('menuCrown'),22,18);
  var b=getBest();document.getElementById('menuBestVal').textContent=b?b.toLocaleString():'---';
  var bs=getBestStreak();

    var sv=document.getElementById('menuStreakVal');
    sv.textContent='x'+bs;sv.style.color=grads[Math.min(bs-2,grads.length-1)];
    sv.style.fontSize=Math.min(22+bs*1.4,46)+'px';
    startFireCanvas(bs);
  } else {badge.style.display='none';stopFireCanvas();}
  updateDailySubLbl();
  updateCoinsBars();

  // floating pieces background
  var cv=document.getElementById('menuShapes');
  var mw=Math.min(innerWidth,420),mh=140;
  cv.width=mw;cv.height=mh;cv.style.width=mw+'px';cv.style.height=mh+'px';
  var ctx=cv.getContext('2d');
  menuPieces=[];
  for(var i=0;i<10;i++){var p=spawnMP(mw,mh);p.x=Math.random()*(mw-p.dim.w);p.y=Math.random()*(mh-p.dim.h);p.alpha=p.tAlpha*Math.random();p.fadeIn=false;menuPieces.push(p);}
  if(menuRaf)cancelAnimationFrame(menuRaf);
  (function tick(){
    ctx.clearRect(0,0,mw,mh);
    if(menuPieces.length<13&&Math.random()<.016)menuPieces.push(spawnMP(mw,mh));
    menuPieces=menuPieces.filter(function(p){
      if(p.fadeIn){p.alpha=Math.min(p.alpha+.013,p.tAlpha);if(p.alpha>=p.tAlpha)p.fadeIn=false;}
      p.x+=p.vx;p.y+=p.vy;p.angle+=p.va;
      if(p.x<-p.dim.w-20||p.x>mw+20||p.y<-p.dim.h-20||p.y>mh+20)return false;
      var cx2=p.x+p.dim.w/2,cy2=p.y+p.dim.h/2;
      ctx.save();ctx.globalAlpha=p.alpha;ctx.translate(cx2,cy2);ctx.rotate(p.angle);ctx.translate(-p.dim.w/2,-p.dim.h/2);
      p.cells.forEach(function(cell){drawMB(ctx,cell.c*MS,cell.r*MS,p.col);});
      ctx.restore();return true;
    });
    menuRaf=requestAnimationFrame(tick);
  })();
}

function menuDim(cells){var mr=0,mc=0;cells.forEach(function(c){if(c.r>mr)mr=c.r;if(c.c>mc)mc=c.c;});return{w:(mc+1)*MS,h:(mr+1)*MS};}
function drawMB(ctx,px,py,col){
  var m=1,x=px+m,y=py+m,w=MS-m*2,h=MS-m*2,r=Math.max(0,Math.min(w*.22,4));
  if(w<2||h<2)return;
  ctx.fillStyle=col.sd;rrect(ctx,x+1,y+2,w,h,r);ctx.fill();
  ctx.fillStyle=col.f;rrect(ctx,x,y,w,h,r);ctx.fill();
  var g=ctx.createLinearGradient(x,y,x,y+h*.55);g.addColorStop(0,'rgba(255,255,255,.45)');g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g;rrect(ctx,x,y,w,h,r);ctx.fill();
  ctx.fillStyle=col.sh;rrect(ctx,x+2,y+1.5,w-4,Math.max(1,h*.1),r*.4);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.65)';ctx.beginPath();ctx.arc(x+w*.24,y+h*.23,Math.max(.5,MS*.09),0,Math.PI*2);ctx.fill();
}
function spawnMP(mw,mh){
  var sh=MENU_SHAPES[Math.floor(Math.random()*MENU_SHAPES.length)];
  var col=BOARD_THEMES[0].cols[Math.floor(Math.random()*8)];
  var dim=menuDim(sh),edge=Math.floor(Math.random()*4),x,y,vx,vy,spd=.18+Math.random()*.15;
  if(edge===0){x=Math.random()*(mw-dim.w);y=-dim.h-8;vx=(Math.random()-.5)*.3;vy=spd;}
  else if(edge===1){x=mw+8;y=Math.random()*(mh-dim.h);vx=-spd;vy=(Math.random()-.5)*.28;}
  else if(edge===2){x=Math.random()*(mw-dim.w);y=mh+8;vx=(Math.random()-.5)*.3;vy=-spd;}
  else{x=-dim.w-8;y=Math.random()*(mh-dim.h);vx=spd;vy=(Math.random()-.5)*.28;}
  return{cells:sh,col:col,dim:dim,x:x,y:y,vx:vx,vy:vy,angle:Math.random()*Math.PI*2,va:(Math.random()-.5)*.009,alpha:0,tAlpha:.6+Math.random()*.25,fadeIn:true};
}

function getOwnedThemes(){try{return JSON.parse(localStorage.getItem('bb8owned')||'[0]');}catch(e){return[0];}}

function drawShopPreview(canvas, themeIdx){
  var t=BOARD_THEMES[themeIdx%BOARD_THEMES.length];
  var w=canvas.width,h=canvas.height;
  var ctx=canvas.getContext('2d');
  ctx.fillStyle=t.gridBg||'rgba(0,0,40,.6)';ctx.fillRect(0,0,w,h);
  // Draw small blocks in theme colors
  var layout=[
    [0,0,0],[1,0,1],[2,0,2],
    [0,1,3],[1,1,4],[2,1,5],
    [0,2,6],[1,2,7],[2,2,0],
  ];
  var bs=Math.floor((Math.min(w,h)-8)/3);
  var pad=(w-bs*3)/2;
  layout.forEach(function(b){
    var col=t.cols[b[2]];
    var x=pad+b[0]*bs+1,y=4+b[1]*bs+1,bw=bs-3,bh=bs-3;
    if(bw<2||bh<2)return;
    // shadow
    ctx.fillStyle=col.sd;ctx.fillRect(x+1,y+2,bw,bh);
    // body
    ctx.fillStyle=col.f;ctx.fillRect(x,y,bw,bh);
    // shine
    var g=ctx.createLinearGradient(x,y,x,y+bh*.5);
    g.addColorStop(0,'rgba(255,255,255,.5)');g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=g;ctx.fillRect(x,y,bw,bh*.5);
    // glint
    ctx.fillStyle='rgba(255,255,255,.7)';ctx.beginPath();ctx.arc(x+bw*.25,y+bh*.25,bw*.1,0,Math.PI*2);ctx.fill();
  });
}

function renderShop(){
  // update coins
  var sc=document.getElementById('shopCoins');if(sc)sc.textContent=getCoins();
  var sic=document.getElementById('shopCoinIco');if(sic)drawBlastCoin(sic,22);

  var owned=getOwnedThemes(),active=getActiveThemeIdx();
  var grid=document.getElementById('shopGrid');if(!grid)return;

  grid.innerHTML=SHOP_THEMES.map(function(t){
    var isOwned=ownsTheme(t.id),isActive=t.id===active;
    var cls='shop-item'+(isActive?' active-theme':isOwned?' owned':'');
    var badge=t.price>=150&&!isOwned?'<div class="shop-badge">Хит</div>':'';
    var priceRow=isActive
      ?'<div class="shop-active-tag">✓ Активна</div>'
      :isOwned
        ?'<div class="shop-owned-tag">✓ Выбрать</div>'
        :t.price===0
          ?'<div class="shop-price-row"><span class="shop-price-val">Бесплатно</span></div>'
          :'<div class="shop-price-row"><canvas id="sp-ico-'+t.id+'" width="16" height="16"></canvas><span class="shop-price-val">'+t.price+'</span></div>';
    return '<div class="'+cls+'" id="shop-item-'+t.id+'" onclick="buyOrActivateTheme('+t.id+')">'+badge+
      '<canvas id="sp-prev-'+t.id+'" width="90" height="60" style="width:90px;height:60px;border-radius:10px;display:block;margin:0 auto"></canvas>'+
      '<div class="shop-name">'+t.name+'</div>'+priceRow+'</div>';
  }).join('');

  // draw previews and coins after DOM update - double RAF for safety
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    SHOP_THEMES.forEach(function(t){
      try{var cv=document.getElementById('sp-prev-'+t.id);if(cv&&cv.getContext)drawShopPreview(cv,t.id);}catch(e){}
      try{var ico=document.getElementById('sp-ico-'+t.id);if(ico&&ico.getContext)drawBlastCoin(ico,16);}catch(e){}
    });
  });});

  // update shop sub label in menu
  var ssl=document.getElementById('shopSubLbl');
  if(ssl)ssl.textContent=owned.length+'/'+SHOP_THEMES.length+' куплено';
}

// Draw shop icon for menu button
function drawShopIcon(cv){
  var sz=cv.width,ctx=cv.getContext('2d');ctx.clearRect(0,0,sz,sz);
  // shopping bag shape
  ctx.fillStyle='rgba(255,255,255,.15)';ctx.beginPath();
  ctx.roundRect(4,10,sz-8,sz-12,4);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=2;ctx.beginPath();
  ctx.roundRect(4,10,sz-8,sz-12,4);ctx.stroke();
  // handles
  ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=2;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(sz*.33,10,sz*.16,Math.PI,0);ctx.stroke();
  ctx.beginPath();ctx.arc(sz*.67,10,sz*.16,Math.PI,0);ctx.stroke();
  // star/price tag
  ctx.fillStyle='#ffd740';ctx.font='bold '+(sz*.38)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('★',sz/2,sz*.62);
}
