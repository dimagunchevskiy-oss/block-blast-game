// ══════════════════════════════════════════════════════════
// IMPROVED SHARE CARD (2x resolution)
// ══════════════════════════════════════════════════════════
function drawShareCard(sc,lines,maxC,isNew){
  var cv=document.getElementById('shareCard');
  // 2x для чёткости
  var W=320,H=420;
  cv.width=W*2; cv.height=H*2;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  var ctx=cv.getContext('2d');
  ctx.scale(2,2);

  // deep bg gradient
  var bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#0d0824');
  bg.addColorStop(0.4,'#140e3a');
  bg.addColorStop(1,'#080c20');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // glow orbs
  [[0.18,0.18,'rgba(167,139,250,.4)'],[0.82,0.75,'rgba(244,63,94,.35)'],[0.5,0.45,'rgba(56,189,248,.2)']].forEach(function(g){
    var gr=ctx.createRadialGradient(g[0]*W,g[1]*H,0,g[0]*W,g[1]*H,W*0.55);
    gr.addColorStop(0,g[2]); gr.addColorStop(1,'transparent');
    ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
  });

  // border glow
  ctx.strokeStyle='rgba(167,139,250,.3)';
  ctx.lineWidth=1.5;
  rrect(ctx,2,2,W-4,H-4,22); ctx.stroke();

  // LOGO
  ctx.textAlign='center';
  ctx.font='700 22px "Fredoka One",cursive';
  var lg=ctx.createLinearGradient(40,0,W-40,0);
  lg.addColorStop(0,'#ffd47e'); lg.addColorStop(0.5,'#ff6b6b'); lg.addColorStop(1,'#a78bfa');
  ctx.fillStyle=lg;
  ctx.fillText('БЛОК БЛАСТ',W/2,38);

  // thin divider
  var dv=ctx.createLinearGradient(20,0,W-20,0);
  dv.addColorStop(0,'transparent'); dv.addColorStop(0.5,'rgba(255,255,255,.3)'); dv.addColorStop(1,'transparent');
  ctx.strokeStyle=dv; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(20,52); ctx.lineTo(W-20,52); ctx.stroke();

  // NEW RECORD badge
  var yOff=0;
  if(isNew){
    ctx.save();
    var br=ctx.createLinearGradient(W/2-75,62,W/2+75,88);
    br.addColorStop(0,'#ffd700'); br.addColorStop(1,'#f43f5e');
    ctx.fillStyle=br;
    rrect(ctx,W/2-75,62,150,30,15); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.font='700 14px "Fredoka One",cursive';
    ctx.fillText('✨ НОВЫЙ РЕКОРД ✨',W/2,82);
    ctx.restore();
    yOff=40;
  }

  // SCORE label
  var sy=72+yOff;
  ctx.fillStyle='rgba(255,255,255,.38)';
  ctx.font='500 11px sans-serif';
  ctx.letterSpacing='5px';
  ctx.fillText('ФИНАЛЬНЫЙ СЧЁТ',W/2,sy);
  ctx.letterSpacing='0px';

  // SCORE number with glow
  ctx.save();
  ctx.shadowColor='rgba(255,212,126,.5)';
  ctx.shadowBlur=20;
  var fontSize=sc>=1000000?44:sc>=100000?50:56;
  ctx.font='700 '+fontSize+'px "Fredoka One",cursive';
  var sg=ctx.createLinearGradient(0,sy+8,0,sy+8+fontSize);
  sg.addColorStop(0,'#ffffff'); sg.addColorStop(0.5,'#ffd47e'); sg.addColorStop(1,'#ff9f43');
  ctx.fillStyle=sg;
  ctx.fillText(sc.toLocaleString(),W/2,sy+10+fontSize*0.82);
  ctx.restore();

  // 3-col stats
  var statY=sy+10+fontSize*0.82+20;
  var stats=[
    {ico:'📦',lbl:'ЛИНИЙ',val:String(lines)},
    {ico:'⚡',lbl:'КОМБО',val:'x'+maxC},
    {ico:'🏆',lbl:'РЕКОРД',val:getBest().toLocaleString()},
  ];
  var bw=82,bh=62,gap=7,totalW=stats.length*(bw+gap)-gap;
  var bx0=(W-totalW)/2;
  stats.forEach(function(s,i){
    var bx=bx0+i*(bw+gap);
    // card bg
    ctx.fillStyle='rgba(255,255,255,.06)';
    rrect(ctx,bx,statY,bw,bh,12); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=1;
    rrect(ctx,bx,statY,bw,bh,12); ctx.stroke();
    // icon
    ctx.font='18px sans-serif'; ctx.textAlign='center';
    ctx.fillStyle='#fff'; ctx.fillText(s.ico,bx+bw/2,statY+24);
    // label
    ctx.font='9px sans-serif'; ctx.fillStyle='rgba(255,255,255,.38)';
    ctx.letterSpacing='2px'; ctx.fillText(s.lbl,bx+bw/2,statY+37);
    ctx.letterSpacing='0px';
    // value
    ctx.font='700 18px "Fredoka One",cursive'; ctx.fillStyle='#fff';
    ctx.fillText(s.val,bx+bw/2,statY+56);
  });

  // decorative block row
  var blockY=statY+bh+18;
  var blockSz=16, blockGap=3;
  var blockCols=COLS.slice(0,6);
  var totalBW=blockCols.length*(blockSz+blockGap)-blockGap;
  var bx2=(W-totalBW)/2;
  blockCols.forEach(function(c,i){
    drawBlock(ctx, bx2+i*(blockSz+blockGap), blockY, c, blockSz);
  });

  // footer bar
  var footY=H-32;
  var fb=ctx.createLinearGradient(0,footY,W,footY);
  fb.addColorStop(0,'rgba(167,139,250,.15)'); fb.addColorStop(0.5,'rgba(244,63,94,.15)'); fb.addColorStop(1,'rgba(56,189,248,.15)');
  ctx.fillStyle=fb; ctx.fillRect(0,footY,W,32);
  ctx.fillStyle='rgba(255,255,255,.3)';
  ctx.font='10px sans-serif'; ctx.letterSpacing='1px';
  ctx.fillText('Блок Бласт  •  by 𝕯𝕴𝕸𝕬  •  Сыграй сам!',W/2,H-14);

  ctx.setTransform(1,0,0,1,0,0);
}
